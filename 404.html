<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Kindred</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to the Kindred home page or browse the blog." />
<meta name="robots" content="noindex,follow" />
<link rel="icon" type="image/png" href="/images/favicon.png?v=2">
<link rel="apple-touch-icon" href="/images/app-icon.png">
<link rel="preload" as="font" type="font/woff2" href="/fonts/dm-sans.woff2" crossorigin>
<link rel="stylesheet" href="/css/shared.css">
<style>
.not-found {
  max-width: 560px;
  margin: 0 auto;
  padding: 120px 28px 96px;
  text-align: center;
}
.not-found h1 {
  font-size: 56px;
  line-height: 1.1;
  margin-bottom: 20px;
}
.not-found p {
  font-size: 18px;
  line-height: 1.6;
  color: var(--text-secondary);
  margin-bottom: 40px;
}
.not-found-secondary {
  display: block;
  margin-top: 24px;
  font-size: 15px;
  color: var(--text-secondary);
  text-decoration: none;
}
.not-found-secondary:hover { color: var(--foreground); text-decoration: underline; }

@media (max-width: 600px) {
  .not-found { padding: 80px 20px 64px; }
  .not-found h1 { font-size: 40px; }
  .not-found p { font-size: 16px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Kindred</a>
    <div class="nav-right">
      <a href="/blog/" class="nav-link">Blog</a>
      <a href="/" class="btn-pill">Home</a>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<main class="not-found">
  <h1>This page isn't here</h1>
  <p>The link might be wrong, or the page might have moved.</p>
  <a href="/" class="btn-primary">Go home</a>
  <a href="/blog/" class="not-found-secondary">Or read the blog</a>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-links">
      <a href="/blog/">Blog</a>
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Use</a>
      <a href="mailto:support@kindredconnect.app">Contact</a>
    </div>
    <p class="footer-copy">© 2026 Kindred Connect</p>
  </div>
</footer>

</body>
</html>
